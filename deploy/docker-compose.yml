# Portainer Stack 배포용
# 호스트에 relay 바이너리와 relay.db를 배치한 뒤 alpine 컨테이너에서 직접 실행
# 바이너리 경로: /home/user/relay/relay (실행 파일)
# DB 경로:      /home/user/relay/relay.db (자동 생성 또는 기존 파일)

services:
  relay:
    image: alpine:3.19
    deploy:
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
    ports:
      - "8080:8080"
    volumes:
      - /home/user/relay:/data
    environment:
      - DB_PATH=/data/relay.db
      - PORT=8080
    working_dir: /data
    command: ["./relay"]
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

networks:
  app-network:
    external: true
